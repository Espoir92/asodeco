applications:
  asodeco:
    type: php:8.3
    
    runtime:
      extensions:
        - pdo_mysql
        - apcu
        - intl
        - mbstring

    variables:
      env:
        APP_ENV: prod
        APP_DEBUG: 0
        # Indispensable pour sécuriser les jetons CSRF des formulaires (Contact, Login)
        APP_SECRET: "ChangerCeCodeParUnCodeAleatoire123"
        # URL de connexion à la base de données interne
        DATABASE_URL: "mysql://main@database.internal:3306/main?serverVersion=10.6&charset=utf8mb4&collation=utf8mb4_unicode_ci"
        # Empêche l'erreur 500 sur Contact en ignorant l'envoi réel pour l'instant
        MAILER_DSN: "null://default"

    web:
      locations:
        '/':
          root: 'public'
          expires: 1h
          passthru: '/index.php'

    mounts:
      'var': { source: local, source_path: var }
      'public/uploads': { source: local, source_path: uploads }

    hooks:
      build: |
        set -e
        composer install --no-dev --optimize-autoloader
        if [ -f bin/console ]; then
          php bin/console asset-map:compile --no-interaction || true
        fi
      
      deploy: |
        set -e
        if [ -f bin/console ]; then
          # On ajoute --allow-no-migration pour éviter les erreurs si tout est déjà à jour
          php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
          php bin/console cache:clear --no-interaction
        fi

    relationships:
      database: "db:mysql"