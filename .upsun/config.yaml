applications:
  asodeco:
    type: php:8.3
    
    runtime:
      extensions:
        - pdo_mysql
        - apcu
        - intl
        - mbstring
        - openssl

    variables:
      env:
        APP_ENV: prod
        APP_DEBUG: 0
        # URL de connexion à la base de données interne
        DATABASE_URL: "mysql://main:main@database.internal:3306/main?serverVersion=10.6&charset=utf8mb4"

    web:
      locations:
        '/':
          root: 'public'
          expires: 1h
          passthru: '/index.php'

    mounts:
      'var': { source: local, source_path: var }
      'public/uploads': { source: local, source_path: uploads }

    hooks:
      build: |
        set -e
        composer install --no-dev --optimize-autoloader
        if [ -f bin/console ]; then
          php bin/console asset-map:compile --no-interaction || true
        fi
      
      deploy: |
        set -e
        if [ -f bin/console ]; then
          php bin/console doctrine:migrations:migrate --no-interaction
          php bin/console cache:clear --no-interaction
        fi

    relationships:
      database: "db:mysql"