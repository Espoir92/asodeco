name: asodeco
type: php:8.3

runtime:
    extensions:
        - pdo_mysql
        - intl
        - gd
        - zip
        - curl

build:
    flavor: composer

relationships:
    database: "db:mysql"

web:
    locations:
        '/':
            root: "public"
            passthru: "/index.php"
            index:
                - index.php
            allow: true

hooks:
    build: |
        set -e
        composer install --no-dev --optimize-autoloader
    deploy: |
        set -e
        php bin/console doctrine:migrations:migrate --no-interaction
        php bin/console cache:clear --env=prod