# .platform/routes.yaml
"https://{default}/":
    type: upstream
    upstream: "asodeco:http"

"https://www.{default}/":
    type: redirect
    to: "https://{default}/"

"http://{default}/":
    type: redirect
    to: "https://{default}/"

"http://www.{default}/":
    type: redirect
    to: "https://{default}/"